<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1200, height=630" />
  <title>OG Image</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      background: #181c2e;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .frame {
      width: 1200px;
      height: 630px;
      background: #181c2e;
      display: flex;
    }

    .container {
      width: 100%;
      height: 100%;
      padding: 80px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      text-align: left;
    }

    .intro {
      color: #9aaac8;
      font-size: 32px;
      margin-bottom: 16px;
      letter-spacing: 0.08em;
    }

    .name {
      color: #f1f3f9;
      font-size: 100px;
      font-weight: 800;
      line-height: 1.05;
      margin-bottom: 24px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      align-self: flex-start;
      border: 2px solid rgba(110, 139, 191, 0.25);
      background: rgba(110, 139, 191, 0.08);
      color: #9aaac8;
      font-size: 38px;
      padding: 16px 32px;
      border-radius: 999px;
      letter-spacing: 0.05em;
      margin-bottom: 48px;
    }

    .tagline {
      color: #9aaac8;
      font-size: 44px;
      font-weight: 500;
      max-width: 900px;
      line-height: 1.3;
    }

    .highlight {
      color: #f1f3f9;
      font-weight: 600;
    }

    .prompt {
      position: absolute;
      bottom: 48px;
      right: 80px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 20px;
      font-weight: 700;
      color: #526080;
      opacity: 0.4;
      letter-spacing: 0.02em;
    }
  </style>
</head>

<body>
  <div class="frame">
    <div class="container">
      <div class="intro">Hello, I'm</div>
      <div class="name">Nassim Lattab</div>
      <div class="badge">AI Engineer</div>
      <div class="tagline">
        I build systems that <span class="highlight"><em>think.</em></span>
      </div>
      <div class="prompt">&gt; Follow the white rabbit.</div>
    </div>
  </div>
</body>
</html>
