<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1200, height=630" />
  <title>OG Image</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,700&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
    }

    .frame {
      width: 1200px;
      height: 630px;
      background: linear-gradient(135deg, #1C1C1E 0%, #141414 50%, #0E0E10 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 80px;
      gap: 0;
    }

    .name {
      font-size: 120px;
      font-weight: 800;
      background: linear-gradient(to bottom, #FFFFFF 30%, #8E8E93 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.025em;
      line-height: 1.02;
      margin-bottom: 24px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      border: 2px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.04);
      color: #8E8E93;
      font-size: 52px;
      font-weight: 400;
      padding: 10px 36px;
      border-radius: 999px;
      letter-spacing: 0.04em;
      margin-bottom: 44px;
    }

    .tagline {
      font-size: 52px;
      font-weight: 400;
      color: #8E8E93;
      line-height: 1.3;
      filter: drop-shadow(0 0 18px rgba(255,255,255,0.15));
    }

    .accent {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 700;
      background: linear-gradient(to bottom, #F5F5F7 50%, #3A3A3C 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="container">
      <div class="name">Nassim Lattab</div>
      <div class="badge">AI Engineer</div>
      <div class="tagline">I build systems that <span class="accent">think.</span></div>
    </div>
  </div>
</body>
</html>
