<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>og:image – Nassim Lattab</title>

  <meta property="og:title" content="Nassim Lattab – AI Engineer" />
  <meta property="og:description" content="I build systems that think." />
  <meta property="og:image" content="og.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="og.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,800;1,700&family=Cormorant+Garamond:ital,wght@1,700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
    }

    .og {
      position: relative;
      width: 1200px;
      height: 630px;
      background: #1c1c1e;
      overflow: hidden;
    }

    .border-top {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: rgba(255,255,255,0.08);
    }

    .border-bottom {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 1px;
      background: rgba(255,255,255,0.08);
    }

    .top-block {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -65%);
      display: flex;
      flex-direction: column;
      align-items: center;
      white-space: nowrap;
    }

    .name {
      font-size: 100px;
      font-weight: 800;
      line-height: 1;
      color: #F5F5F7;
      white-space: nowrap;
    }

    .divider {
      width: 360px;
      height: 1px;
      background: rgba(255,255,255,0.18);
      margin: 22px 0 20px;
    }

    .role {
      font-size: 48px;
      font-weight: 500;
      letter-spacing: 0;
      color: rgba(245,245,247,0.50);
      white-space: nowrap;
    }

    .tagline {
      position: absolute;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      font-size: 44px;
      font-weight: 400;
      letter-spacing: 0;
      color: rgba(245,245,247,0.80);
    }

    .think {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 700;
      font-size: 1em;
      background: linear-gradient(to bottom, #F5F5F7 50%, #3A3A3C 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 14px rgba(255,255,255,0.35));
    }
  </style>
</head>
<body>
  <div class="og">
    <div class="border-top"></div>
    <div class="top-block">
      <span class="name">Nassim Lattab</span>
      <div class="divider"></div>
      <span class="role">AI Engineer</span>
    </div>
    <p class="tagline">I build systems that <span class="think">think.</span></p>
    <div class="border-bottom"></div>
  </div>
</body>
</html>
