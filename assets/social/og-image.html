<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1200, height=630" />
  <title>OG Image</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      background: #121626; /* 🎯 only theme bg */
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .frame {
      width: 1200px;
      height: 630px;
      background: #121626; /* no gradient, pure flat */
      display: flex;
    }

    .container {
      width: 100%;
      height: 100%;
      padding: 80px;

      display: flex;
      flex-direction: column;
      justify-content: center;
      text-align: left;
    }

    .intro {
      color: #8ea2c7;
      font-size: 24px;
      margin-bottom: 16px;
      letter-spacing: 0.08em;
    }

    .name {
      color: #f4f7ff;
      font-size: 108px;
      font-weight: 800;
      line-height: 1.05;
      margin-bottom: 20px;
    }

    .badge {
      display: inline-flex;
      align-items: center;

      width: fit-content;
      align-self: flex-start;

      border: 2px solid rgba(127, 155, 214, 0.18);
      background: rgba(127, 155, 214, 0.06);

      color: #a8b6d6;

      font-size: 32px;
      padding: 16px 28px;
      border-radius: 999px;

      letter-spacing: 0.05em;
      margin-bottom: 30px;
    }

    .tagline {
      color: #a8b6d6;
      font-size: 44px;
      font-weight: 500;
      max-width: 900px;
      line-height: 1.3;
    }

    .highlight {
      color: #f1f3f9;
      font-weight: 600;
    }
  </style>
</head>

<body>
  <div class="frame">
    <div class="container">
      <div class="intro">Hello, I'm</div>

      <div class="name">Nassim Lattab</div>

      <div class="badge">AI Engineer</div>

      <div class="tagline">
        I build systems that <span class="highlight"><em>think.</em></span>
      </div>
    </div>
  </div>
</body>
</html>
