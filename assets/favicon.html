<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Favicon</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@800&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0;
    width: 512px;
    height: 512px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f5f5f7;
    font-family: 'Inter', -apple-system, sans-serif;
  }

  .icon {
    width: 400px;
    height: 400px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .icon span {
    font-size: 280px;       
    font-weight: 800;      
    color: #1d1d1f;
    letter-spacing: -0.04em;
  }
</style>
</head>
<body>

<div class="icon">
  <span>N</span>
</div>

</body>
</html>
