<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OG Image</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 630px;
    font-family: 'Inter', -apple-system, sans-serif;
    background: #f5f5f7;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card {
    width: 1000px;
    height: 420px;
    background: #fbfbfd;
    border-radius: 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    border: 1px solid rgba(0,0,0,0.08);
    box-shadow: 0 12px 48px rgba(0,0,0,0.10);
  }

  h1 {
    font-size: 72px;
    font-weight: 600;
    color: #1d1d1f;
    letter-spacing: -0.04em;
  }

  p {
    font-size: 28px;
    color: #6e6e73;
  }

  .line {
    width: 180px;
    height: 3px;
    background: #0071e3;
    border-radius: 2px;
    margin-top: 10px;
  }
</style>
</head>
<body>

<div class="card">
  <h1>Nassim Lattab</h1>
  <p>AI Engineer · Paris</p>
  <div class="line"></div>
</div>

</body>
</html>
